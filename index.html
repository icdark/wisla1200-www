<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pogoda na trasie Wisły 1200</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page container py-3 py-md-4">
    <nav class="tabs nav nav-pills mb-3" aria-label="Widoki">
      <button id="rideTab" class="nav-link active" type="button" data-tab="ride">Przejazd</button>
      <button id="mapTab" class="nav-link" type="button" data-tab="map">Mapa</button>
      <button id="weatherTab" class="nav-link" type="button" data-tab="weather">Pogoda</button>
      <button id="shopsTab" class="nav-link" type="button" data-tab="shops">Sklepy</button>
    </nav>

    <section id="weatherPanel" class="tab-panel">
    <section class="controls card shadow-sm" aria-label="Filtry">
      <div class="card-body d-flex flex-wrap align-items-end gap-3">
        <div>
          <label for="dateSelect" class="form-label">Dzień</label>
          <select id="dateSelect" class="form-select"></select>
        </div>
        <button id="refreshButton" type="button" class="btn btn-primary">Odśwież dane</button>
        <button id="clearCacheButton" type="button" class="btn btn-outline-secondary">Wyczyść cache</button>
      </div>
    </section>

    <section id="status" class="status" role="status">Ładowanie prognozy…</section>
    <section id="forecast" class="forecast" aria-live="polite"></section>
    </section>

    <section id="shopsPanel" class="tab-panel">
      <div class="shops card shadow-sm">
        <div class="card-body">
          <h1 class="h5 mb-3">Sklepy na trasie</h1>
          <div id="shopsList" class="shops-list"></div>
        </div>
      </div>
    </section>

    <section id="ridePanel" class="tab-panel active">
      <div class="ride card shadow-sm">
        <div class="card-body">
          <div class="ride-header">
            <h1 class="h5 mb-0">Plan przejazdu</h1>
            <button id="toggleRideSettings" type="button" class="btn btn-sm btn-outline-secondary">Zwiń ustawienia</button>
          </div>
          <div id="rideSettings" class="ride-settings">
          <div class="ride-controls">
            <div>
              <label for="currentKm" class="form-label">Aktualny km</label>
              <input id="currentKm" class="form-control" type="number" min="0" max="1200" step="1" value="0">
            </div>
            <div>
              <label for="grossSpeed" class="form-label">Średnia brutto km/h</label>
              <input id="grossSpeed" class="form-control" type="number" min="1" step="0.5" value="16">
            </div>
            <div>
              <label for="rideStartTime" class="form-label">Pierwszy start</label>
              <input id="rideStartTime" class="form-control" type="time" value="07:20">
            </div>
            <div>
              <label for="defaultRideStart" class="form-label">Jazda od</label>
              <input id="defaultRideStart" class="form-control" type="time" value="07:00">
            </div>
            <div>
              <label for="defaultRideEnd" class="form-label">Jazda do</label>
              <input id="defaultRideEnd" class="form-control" type="time" value="22:00">
            </div>
          </div>
          <label class="form-check mt-3">
            <input id="individualRideTimes" class="form-check-input" type="checkbox">
            <span class="form-check-label">Indywidualne czasy dla dni</span>
          </label>
          <div id="rideDays" class="ride-days mt-3"></div>
          <div class="d-flex flex-wrap gap-2 mt-3">
            <button id="calculateRide" type="button" class="btn btn-primary">Przelicz</button>
            <button id="clearRideSettings" type="button" class="btn btn-outline-secondary">Wyczyść</button>
          </div>
          </div>
          <div id="rideResult" class="ride-result mt-3"></div>
        </div>
      </div>
    </section>

    <section id="mapPanel" class="tab-panel">
      <div class="map-embed card shadow-sm">
        <iframe src="https://www.google.com/maps/d/embed?mid=1O7jKSYPGakRe2wXLuPrST2b-UFxAdsE&hl=en&ehbc=2E312F" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
